name: CI

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
  workflow_dispatch:

jobs:
  rust:
    name: Rust Checks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Checkout quire-rs (sibling path dep)
        uses: actions/checkout@v4
        with:
          repository: agent-ix/quire-rs
          path: ../quire-rs

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: make fmt-check

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Unsafe audit
        run: make audit-unsafe

      - name: Thin-boundary audit
        run: make audit-thin-boundary

  licenses:
    name: License + bans Check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Checkout quire-rs (sibling path dep)
        uses: actions/checkout@v4
        with:
          repository: agent-ix/quire-rs
          path: ../quire-rs
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - name: cargo deny check licenses
        run: make deny
      - name: cargo deny check bans
        run: make deny-bans

  bench:
    name: Latency budget (NFR-001)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Checkout quire-rs (sibling path dep)
        uses: actions/checkout@v4
        with:
          repository: agent-ix/quire-rs
          path: ../quire-rs
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
      - name: Install hyperfine
        uses: taiki-e/install-action@v2
        with:
          tool: hyperfine
      - name: Run bench (p95 ≤ 50 ms gate)
        run: make bench
