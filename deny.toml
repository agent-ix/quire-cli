[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CDLA-Permissive-2.0",
    "ISC",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "allow"
wildcards = "warn"
# NFR-004: no network. Deny every HTTP / RPC client crate so a future
# transitive dep can't sneak the process out of the sandbox.
deny = [
    { name = "reqwest" },
    { name = "hyper" },
    { name = "tonic" },
    { name = "surf" },
    { name = "ureq" },
]

[advisories]
version = 2

[sources]
unknown-registry = "deny"
unknown-git = "deny"
